<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>忘不掉的記憶｜國寫素養導向</title>
  <style>
    :root{
      --bg:#fff7fb;
      --card:#ffffff;
      --ink:#2b2430;
      --muted:#6b6070;
      --pink:#ff6fb5;
      --lav:#b58bff;
      --line:#f0d6ea;
      --shadow: 0 10px 30px rgba(34, 20, 40, .08);
      --r:18px;
      --pad:18px;
      --max: 980px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(1200px 700px at 20% 10%, #ffe2f1 0%, transparent 55%),
                  radial-gradient(900px 600px at 85% 20%, #efe6ff 0%, transparent 55%),
                  var(--bg);
      color:var(--ink);
      line-height:1.65;
    }
    .wrap{max-width:var(--max); margin:0 auto; padding:28px 16px 60px;}
    .hero{
      background: linear-gradient(135deg, rgba(255,111,181,.15), rgba(181,139,255,.15));
      border:1px solid rgba(255,111,181,.18);
      box-shadow: var(--shadow);
      border-radius: calc(var(--r) + 8px);
      padding: 26px;
      position: relative;
      overflow:hidden;
    }
    .badge{
      display:inline-flex; gap:8px; align-items:center;
      padding:6px 12px; border-radius:999px;
      background: rgba(255,111,181,.12);
      border: 1px solid rgba(255,111,181,.18);
      color: var(--muted);
